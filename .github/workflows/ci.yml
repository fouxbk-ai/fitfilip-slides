name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  static-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON, links and secrets
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path
          from html.parser import HTMLParser

          for path in Path('.').glob('*.json'):
              json.loads(path.read_text(encoding='utf-8'))

          class Links(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.links = []
              def handle_starttag(self, tag, attrs):
                  if tag == 'a':
                      value = dict(attrs).get('href', '')
                      if value and not value.startswith(('http://', 'https://', '#', 'mailto:')):
                          self.links.append(value.split('#', 1)[0].split('?', 1)[0])

          parser = Links()
          parser.feed(Path('index.html').read_text(encoding='utf-8'))
          missing = sorted({link for link in parser.links if not Path(link).is_file()})
          assert not missing, f'missing index links: {missing}'
          PY
          ! git grep -nE 'BEGIN (RSA|OPENSSH|EC) PRIVATE KEY|github[_]pat_|ghp_[A-Za-z0-9]{20,}|s[k]-[A-Za-z0-9_-]{20,}' -- ':!.github/workflows/ci.yml'
